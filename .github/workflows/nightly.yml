---
# -------------------------------------------------------------------------------------------------
# Job Name
# -------------------------------------------------------------------------------------------------
name: nightly


# -------------------------------------------------------------------------------------------------
# When to run
# -------------------------------------------------------------------------------------------------
on:
  # Runs manually
  workflow_dispatch:
  # Runs daily
  schedule:
    - cron: '0 0 * * *'

# -------------------------------------------------------------------------------------------------
# What to run
# -------------------------------------------------------------------------------------------------
jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
      - uses: actions/checkout@v2
        with:
          repository: espocrm/espocrm
          ref: refs/heads/master
          fetch-depth: 0
      - uses: actions/setup-node@v2
        with:
          node-version: 14
      - run: npm install --ignore-scripts
      - run: grunt
      - run: cd build/EspoCRM-* && zip -q -r ../../EspoCRM-nightly-${{ steps.date.outputs.date }}.zip *
      - uses: ncipollo/release-action@v1
        with:
          artifacts: EspoCRM-nightly-${{ steps.date.outputs.date }}.zip
          commit: nightly
          tag: nightly-${{ steps.date.outputs.date }}
